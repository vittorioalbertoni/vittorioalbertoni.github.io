<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Mio Sito Web | GitHub Pages</title>
    <style>
        /* Un design semplice, moderno e responsive */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
        }
        header {
            background-color: #24292e; /* Colore scuro stile GitHub */
            color: #fff;
            padding: 2rem;
            text-align: center;
        }
        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .card {
            background: #fff;
            padding: 1.5rem;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
        }
        a {
            color: #0366d6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>Benvenuto da Vittorio Albertoni</h1>
        <p>Ospitato gratuitamente con GitHub Pages</p>
    </header>

    <main>
        <section class="card">
            <h2>Chi Sono 🚀</h2>
            <p>Ciao! Questa è la mia pagina iniziale. Ho creato questo sito per mettere in mostra i miei progetti, le mie passioni o semplicemente per sperimentare con il codice.</p>
            <p><a href="pdf/">Vai ai contenuti</a> </p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 - Creato con ❤️ da Te</p>
    </footer>

</body>
